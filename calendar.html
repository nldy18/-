<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间清单 - 日历</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#f5f5f5">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/maskable.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body class="page-calendar">
    <div class="container">
        <header>
            <div class="header-top">
                <a href="index.html" class="btn-back">← 返回任务</a>
                <h1 class="app-title">日历</h1>
            </div>
            <div class="header-controls">
                <button id="prevMonth" class="btn-nav">‹</button>
                <span id="currentMonthYear"></span>
                <button id="nextMonth" class="btn-nav">›</button>
            </div>
        </header>
        <main>
            <div id="calendar" class="calendar"></div>
        </main>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/pwa.js?t=1765684361"></script>
    <script>
        // 显示用户信息和退出按钮
        document.addEventListener('DOMContentLoaded', () => {
            const userInfo = Auth.getUserInfo();
            if (userInfo) {
                const nicknameEl = document.getElementById('userNickname');
                if (nicknameEl) {
                    nicknameEl.textContent = userInfo.nickname || '用户';
                }
            }

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    if (confirm('确定要退出登录吗？')) {
                        Auth.logout();
                    }
                });
            }
        });
    </script>
</body>
</html>
