<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 时间清单</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#f5f5f5">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/maskable.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1777b3;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .login-logo {
            width: 48px;
            height: 48px;
        }
        .login-box h1 {
            color: #1777b3;
            margin: 0;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: 3px;
        }
        .login-box p {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .wechat-login-btn {
            width: 100%;
            padding: 15px;
            background-color: #07c160;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .wechat-login-btn:hover {
            background-color: #06ad56;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
        }
        .wechat-icon {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .loading {
            display: none;
            margin-top: 20px;
            color: #7f8c8d;
        }
        .loading.show {
            display: block;
        }
        .error-message {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background-color: #fee;
            color: #c33;
            border-radius: 6px;
            font-size: 14px;
        }
        .error-message.show {
            display: block;
            white-space: pre-line;
        }
        .dev-mode-notice {
            margin-top: 20px;
            padding: 12px;
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            font-size: 12px;
            color: #856404;
        }
        .server-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
        }
        .server-status.checking {
            background-color: #e3f2fd;
            color: #1976d2;
        }
        .server-status.online {
            background-color: #e8f5e9;
            color: #2e7d32;
        }
        .server-status.offline {
            background-color: #ffebee;
            color: #c62828;
        }
        
        /* 新增样式 */
        .login-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        
        .login-tab {
            background: none;
            border: none;
            font-size: 15px;
            color: #999;
            cursor: pointer;
            padding: 8px 12px;
            position: relative;
            transition: all 0.2s;
        }
        
        .login-tab.active {
            color: #2c3e50;
            font-weight: 600;
        }
        
        .login-tab.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            right: 0;
            height: 2px;
            background: #1777b3;
            border-radius: 2px;
        }

        .login-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .login-panel.active {
            display: block;
        }
        
        .login-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box; /* 确保 padding 不撑大 */
        }
        
        .login-input:focus {
            border-color: #1777b3;
            box-shadow: 0 0 0 3px rgba(23, 119, 179, 0.1);
        }
        
        .account-login-btn {
            width: 100%;
            padding: 12px;
            background: #1777b3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .account-login-btn:hover {
            opacity: 0.9;
        }
        
        .form-group {
            margin-bottom: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0.5; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-brand">
                <img src="icons/logo.svg" alt="Logo" class="login-logo">
                <h1>时间清单</h1>
            </div>
            <p>选择登录方式</p>
            
            <!-- 登录方式切换器 -->
            <div class="login-tabs">
                <button class="login-tab active" data-type="wechat">微信登录</button>
                <button class="login-tab" data-type="account">账号登录</button>
            </div>

            <!-- 微信登录面板 -->
            <div id="wechatPanel" class="login-panel active">
                <button id="wechatLoginBtn" class="wechat-login-btn">
                    <span>微信一键登录</span>
                </button>
            </div>

            <!-- 账号登录面板 -->
            <div id="accountPanel" class="login-panel">
                <form id="accountForm">
                    <div class="form-group">
                        <input type="tel" id="loginPhone" class="login-input" placeholder="请输入手机号" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" class="login-input" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="account-login-btn">登录</button>
                </form>
            </div>

            <div id="loading" class="loading">正在登录...</div>
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Tab 切换逻辑
        document.querySelectorAll('.login-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.login-panel').forEach(p => p.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.type}Panel`).classList.add('active');
            });
        });

        // 账号登录逻辑
        document.getElementById('accountForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMessage');
            const btn = e.target.querySelector('button');

            if (!phone || !password) return;

            loading.classList.add('show');
            errorMsg.classList.remove('show');
            loading.textContent = '正在登录...';
            btn.disabled = true;

            try {
                await Auth.loginByAccount(phone, password);
                loading.textContent = '登录成功，正在跳转...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            } catch (err) {
                loading.classList.remove('show');
                errorMsg.textContent = err.message;
                errorMsg.classList.add('show');
                btn.disabled = false;
            }
        });

        document.getElementById('wechatLoginBtn').addEventListener('click', async () => {
            const btn = document.getElementById('wechatLoginBtn');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMessage');

            btn.disabled = true;
            loading.classList.add('show');
            errorMsg.classList.remove('show');
            loading.textContent = '正在连接服务器...';

            try {
                // 开发环境：直接模拟登录
                // 生产环境：需要先跳转到微信授权页面获取code
                const isLocalhost = window.location.hostname === 'localhost' || 
                                  window.location.hostname === '127.0.0.1' ||
                                  window.location.hostname === '';
                
                if (isLocalhost) {
                    // 开发模式：模拟登录
                    loading.textContent = '正在登录...';
                    
                    const apiUrl = Auth.API_BASE_URL || 'http://localhost:3000';
                    const response = await fetch(`${apiUrl}/api/auth/wechat-login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ code: 'mock_code_' + Date.now() })
                    });

                    if (!response.ok) {
                        // 尝试解析错误信息
                        let errorText = '登录失败';
                        try {
                            const errorData = await response.json();
                            errorText = errorData.error || errorText;
                        } catch (e) {
                            if (response.status === 0 || response.status >= 500) {
                                errorText = '无法连接到服务器，请确保服务器已启动（运行 npm start）';
                            } else {
                                errorText = `服务器错误 (${response.status})`;
                            }
                        }
                        throw new Error(errorText);
                    }

                    const data = await response.json();

                    if (data.token) {
                        // 保存token和用户信息
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('user_info', JSON.stringify(data.user));
                        
                        loading.textContent = '登录成功，正在跳转...';
                        
                        // 跳转到主页
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 500);
                    } else {
                        throw new Error(data.error || '登录失败：未收到token');
                    }
                } else {
                    // 生产环境：跳转到微信授权页面
                    const wechatAppId = 'your-wechat-appid'; // 需要替换为真实的AppID
                    const redirectUri = encodeURIComponent(window.location.origin + '/login.html');
                    const state = Math.random().toString(36).substring(7);
                    localStorage.setItem('wechat_state', state);
                    
                    window.location.href = `https://open.weixin.qq.com/connect/oauth2/authorize?appid=${wechatAppId}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_userinfo&state=${state}#wechat_redirect`;
                }
            } catch (error) {
                console.error('登录错误:', error);
                let errorMessage = error.message || '登录失败，请重试';
                
                // 网络错误提示
                if (error.message.includes('Failed to fetch') || 
                    error.message.includes('NetworkError') ||
                    error.message.includes('无法连接')) {
                    errorMessage = '无法连接到服务器！\n\n请确保：\n1. 服务器已启动（运行 npm start）\n2. 服务器运行在 http://localhost:3000\n3. 检查防火墙设置';
                }
                
                errorMsg.textContent = errorMessage;
                errorMsg.classList.add('show');
                loading.textContent = '登录失败';
            } finally {
                btn.disabled = false;
                setTimeout(() => {
                    loading.classList.remove('show');
                }, 2000);
            }
        });

        // 处理微信回调（生产环境）
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');

            if (code && state) {
                // 验证state
                const savedState = localStorage.getItem('wechat_state');
                if (savedState !== state) {
                    document.getElementById('errorMessage').textContent = '登录验证失败';
                    document.getElementById('errorMessage').classList.add('show');
                    return;
                }

                const loading = document.getElementById('loading');
                const errorMsg = document.getElementById('errorMessage');
                loading.classList.add('show');

                try {
                    const response = await fetch('/api/auth/wechat-login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ code })
                    });

                    const data = await response.json();

                    if (response.ok && data.token) {
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('user_info', JSON.stringify(data.user));
                        localStorage.removeItem('wechat_state');
                        window.location.href = 'index.html';
                    } else {
                        throw new Error(data.error || '登录失败');
                    }
                } catch (error) {
                    errorMsg.textContent = error.message || '登录失败，请重试';
                    errorMsg.classList.add('show');
                    loading.classList.remove('show');
                }
            }

            // 如果已登录，直接跳转
            if (localStorage.getItem('auth_token')) {
                window.location.href = 'index.html';
            }
        });
    </script>
    <script src="js/pwa.js?t=1765684361"></script>
</body>
</html>
