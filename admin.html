<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 时间清单</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { font-size: 20px; margin-bottom: 20px; color: #333; }
        h2 { font-size: 16px; margin-bottom: 15px; color: #666; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #1777b3; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0d5a8a; }
        button.danger { background: #f44336; }
        button.danger:hover { background: #d32f2f; }
        #log { white-space: pre-wrap; background: #333; color: #fff; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>时间清单 - 简易后台</h1>

    <div class="card">
        <div class="form-group">
            <label>Admin Token</label>
            <input type="password" id="adminToken" placeholder="请输入 ADMIN_TOKEN" value="admin-secret-token">
        </div>
    </div>

    <div class="card">
        <h2>创建新账号</h2>
        <div class="form-group">
            <label>手机号</label>
            <input type="tel" id="createPhone" placeholder="11位手机号">
        </div>
        <div class="form-group">
            <label>昵称 (选填)</label>
            <input type="text" id="createNickname" placeholder="默认：用户+手机号后4位">
        </div>
        <button onclick="createUser()">创建账号 (初始密码 12345678)</button>
    </div>

    <div class="card">
        <h2>重置密码</h2>
        <div class="form-group">
            <label>手机号</label>
            <input type="tel" id="resetPhone" placeholder="目标手机号">
        </div>
        <button class="danger" onclick="resetPassword()">重置为初始密码 (12345678)</button>
    </div>

    <div id="log" class="hidden"></div>

    <script>
        const API_BASE_URL = ''; // 相对路径
        
        function log(msg, isError = false) {
            const logEl = document.getElementById('log');
            logEl.classList.remove('hidden');
            const time = new Date().toLocaleTimeString();
            const color = isError ? '#ff6b6b' : '#69db7c';
            logEl.innerHTML = `<span style="color:${color}">[${time}]</span> ${msg}\n` + logEl.innerHTML;
        }

        function getToken() {
            return document.getElementById('adminToken').value.trim();
        }

        async function request(url, method, body = null) {
            const token = getToken();
            if (!token) {
                alert('请先输入 Admin Token');
                return;
            }

            try {
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: body ? JSON.stringify(body) : null
                });
                
                // 先检查 content-type 是否为 json
                const contentType = res.headers.get("content-type");
                if (!contentType || !contentType.includes("application/json")) {
                    const text = await res.text();
                    if (res.status === 404) {
                        throw new Error('接口不存在 (404)。\n请检查：\n1. 宝塔里是否已【重启】项目？\n2. server.js 代码是否已更新？');
                    }
                    throw new Error(`服务器返回了非 JSON 数据 (${res.status}):\n${text.slice(0, 100)}...`);
                }

                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || '请求失败');
                }
                
                return data;
            } catch (e) {
                log(e.message, true);
                throw e;
            }
        }

        async function createUser() {
            const phone = document.getElementById('createPhone').value.trim();
            const nickname = document.getElementById('createNickname').value.trim();
            
            if (!phone) return alert('请输入手机号');

            try {
                const res = await request(`${API_BASE_URL}/api/admin/users`, 'POST', { phone, nickname });
                log(`创建成功！ID: ${res.userId}, 手机: ${phone}, ${res.message}`);
                document.getElementById('createPhone').value = '';
                document.getElementById('createNickname').value = '';
            } catch (e) {
                // log handled in request
            }
        }

        async function resetPassword() {
            const phone = document.getElementById('resetPhone').value.trim();
            
            if (!phone) return alert('请输入手机号');
            if (!confirm(`确定要重置 ${phone} 的密码为 12345678 吗？`)) return;

            try {
                const res = await request(`${API_BASE_URL}/api/admin/users/${phone}/reset-password`, 'POST');
                log(`重置成功！手机: ${phone}, ${res.message}`);
            } catch (e) {
                // log handled in request
            }
        }
    </script>
</body>
</html>
